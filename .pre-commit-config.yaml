---
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
# - Added pkgs feature flag auto generated code to flake8 exclude list
# Force all unspecified python hooks to run python 3.10
default_language_version:
  python: python3
default_stages:
  - pre-commit
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      # TODO: Exclude tests/test_data directory
        exclude: ^tests/test_data/
        exclude_types:
          - "markdown"
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-added-large-files
        args: ["--maxkb=10240"]
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-ast
      - id: check-json
        exclude: ".vscode/launch.json"
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-toml
      - id: debug-statements
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: forbid-new-submodules
      - id: mixed-line-ending
      - id: no-commit-to-branch
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-d", "relaxed"]
        language: system
  - repo: https://github.com/rhysd/actionlint
    rev: v1.6.26
    hooks:
      - id: actionlint-docker
        args: [-ignore, 'label ".+" is unknown']
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pycqa/docformatter
    rev: v1.7.7
    hooks:
      - id: docformatter
  # - repo: https://github.com/MarcoGorelli/absolufy-imports
  #   rev: v0.3.1
  #   hooks:
  #     - id: absolufy-imports
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.15.0
    hooks:
      - id: pyupgrade
        entry: pyupgrade --py39-plus --keep-runtime-typing
        types:
          - python
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
  - repo: https://github.com/asottile/yesqa
    rev: v1.5.0
    hooks:
      - id: yesqa
  # TODO: Uncomment after typing the SDK
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       language: system
  #       entry: mypy .
  #       pass_filenames: false
  #       # IMPORTANT!
  #       # Keep args same as tool.mypy section in pyproject.toml
  #       args:
  #         [
  #           --allow-subclassing-any,
  #           --allow-untyped-decorators,
  #           --check-untyped-defs,
  #           --exclude, ".*migrations/.*.py",
  #           --exclude, "backend/prompt/.*",
  #           --exclude, "document_display_service/.*",
  #           --exclude, "pkgs/unstract-connectors/tests/.*",
  #           --exclude, "pkgs/unstract-core/.*",
  #           --exclude, "pkgs/unstract-flags/src/unstract/flags/.*",
  #           --exclude, "sdks/.*",
  #           --exclude, "unstract-document-service/.*",
  #           --exclude, "__pypackages__/.*",
  #           --follow-imports, "silent",
  #           --ignore-missing-imports,
  #           --implicit-reexport,
  #           --pretty,
  #           --python-version=3.9,
  #           --show-column-numbers,
  #           --show-error-codes,
  #           --strict,
  #           --warn-redundant-casts,
  #           --warn-return-any,
  #           --warn-unreachable,
  #           --warn-unused-configs,
  #           --warn-unused-ignores,
  #         ]
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: [--disable, MD013]
      - id: markdownlint-fix
        args: [--disable, MD013]
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.2
    hooks:
      - id: uv-lock
